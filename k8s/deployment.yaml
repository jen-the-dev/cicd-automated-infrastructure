apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-cicd-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-cicd-app
  template:
    metadata:
      labels:
        app: portfolio-cicd-app
    spec:
      containers:
        - name: app
          image: ghcr.io/jen-the-dev/portfolio-cicd-app:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-cicd-app
spec:
  selector:
    app: portfolio-cicd-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
